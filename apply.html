<!DOCTYPE html>
<html>
<head>

<title>Apply Online</title>

<link rel="stylesheet" href="style.css">

<style>

form{
background:white;
padding:30px;
max-width:700px;
margin:auto;
}

label{
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
}

button{
background:#0b5d2a;
color:white;
padding:15px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header></header>

<div class="page-banner">
<h1>Online Application Portal</h1>
</div>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email">

<label>Phone</label>
<input type="tel">

<label>Select Program</label>

<select>
<option>Diploma in Nursing</option>
<option>Diploma in Midwifery</option>
<option>Certificate in Nursing</option>
</select>

<label>Academic Background</label>
<textarea></textarea>

<label>Upload Documents</label>
<input type="file">

<button type="submit">Submit Application</button>

</form>

</body>
</html>
