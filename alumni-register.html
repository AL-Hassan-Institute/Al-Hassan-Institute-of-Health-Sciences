<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Alumni – Al-Hassan Institute of Health Sciences</title>

<style>

/* USE YOUR EXACT SAME GLOBAL STYLES */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
  line-height: 1.7;
  background: linear-gradient(to bottom, #f9f9f9, #eef2f3);
  color: #2c3e50;
}

/* HEADER — EXACT COPY */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: linear-gradient(135deg, #0b5d2a, #0f7a38, #0b5d2a);
  padding: 15px;
  border-bottom: 4px solid #d4af37;
  text-align: center;
  color: white;
}

.header-logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: white;
  padding: 6px;
  border: 2px solid #d4af37;
}

/* NAVIGATION */
nav {
  margin-top: 10px;
}

.menu {
  list-style: none;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.menu li {
  margin: 0 10px;
}

.menu a {
  text-decoration: none;
  color: white;
  font-size: 14px;
  padding: 8px 12px;
}

.menu a:hover {
  background: linear-gradient(135deg,#d4af37,#f1c40f);
  color: #0b5d2a;
  border-radius: 5px;
}

/* CONTAINER — EXACT MATCH */
.container {
  max-width: 1200px;
  margin: 60px auto;
  padding: 40px;
  background: white;
  border-radius: 16px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.08),
    0 0 0 1px rgba(212,175,55,0.15);

  position: relative;
}

.container::before {
  content: "";
  position: absolute;
  top: 0;
  left: 20%;
  width: 60%;
  height: 4px;
  background: linear-gradient(to right, transparent, #d4af37, transparent);
}

/* SECTION TITLE */
h2 {
  font-size: 2.2em;
  margin-bottom: 20px;
  color: #0b5d2a;
}

h2::after {
  content: "";
  display: block;
  width: 70%;
  height: 3px;
  margin-top: 8px;
  background: linear-gradient(to right, #d4af37, transparent);
}

/* FORM CARD */
.form-card {
  max-width: 700px;
  margin: auto;
  background: #f9f9f9;
  padding: 30px;
  border-radius: 12px;
  border-left: 5px solid #d4af37;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* FORM ELEMENTS */
.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
  color: #0b5d2a;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
}

input:focus, textarea:focus {
  border-color: #d4af37;
  outline: none;
}

/* BUTTON — SAME GOLD STYLE */
.btn-gold {
  display: inline-block;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #d4af37, #f1c40f);
  color: #0b5d2a;
  font-weight: 700;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.btn-gold:hover {
  transform: translateY(-2px);
}

/* FOOTER — EXACT MATCH */
footer {
  padding: 12px;
  background: linear-gradient(135deg, #0b5d2a, #0f7a38, #0b5d2a);
  color: white;
  text-align: center;
  border-top: 3px solid #d4af37;
}

/* MOBILE */
@media(max-width:768px) {

.container {
  margin: 20px;
  padding: 20px;
}

.header-logo {
  width: 70px;
  height: 70px;
}

}

</style>
</head>

<body>

<header>

<img src="Logo 5.png" class="header-logo">

<h1>Al-Hassan Institute of Health Sciences – Yumbe, Uganda</h1>

<nav>
<ul class="menu">

<li><a href="index.html">Home</a></li>
<li><a href="index.html#about">About</a></li>
<li><a href="index.html#programs">Programs</a></li>
<li><a href="index.html#admissions">Admissions</a></li>
<li><a href="latest-news.html">News</a></li>
<li><a href="alumni-directory.html">Alumni</a></li>
<li><a href="index.html#contact">Contact</a></li>

</ul>
</nav>

</header>


<div class="container">

<h2>Alumni Registration</h2>

<div class="form-card">

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Program Studied</label>
<input type="text">
</div>

<div class="form-group">
<label>Graduation Year</label>
<input type="number">
</div>

<div class="form-group">
<label>Current Workplace</label>
<input type="text">
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="4"></textarea>
</div>

<button class="btn-gold">Register Alumni</button>

</form>

</div>

</div>


<footer>

© 2026 Al-Hassan Institute of Health Sciences – Yumbe, Uganda  
All Rights Reserved

</footer>


</body>
</html>
