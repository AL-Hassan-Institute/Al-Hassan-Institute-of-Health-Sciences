<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Success Stories – Al-Hassan Institute of Health Sciences</title>

<style>
/* ===== Base Styles ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'Segoe UI','Helvetica Neue',sans-serif;
  line-height:1.7;
  background:linear-gradient(to bottom,#f9f9f9,#eef2f3);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(135deg,#0b5d2a,#0f7a38,#0b5d2a);
  border-bottom:4px solid #d4af37;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  color:white;
}
.header-logo{
  width:90px;
  height:90px;
  border-radius:50%;
  background:white;
  padding:5px;
  border:2px solid #d4af37;
  flex-shrink:0;
}
.header-title{
  flex:1;
  text-align:center;
}
header h1{
  font-size:2em;
  letter-spacing:1px;
  text-shadow:0 0 8px rgba(212,175,55,0.6);
  margin-bottom:5px;
}
nav{
  flex-basis:100%;
  display:flex;
  justify-content:center;
  margin-top:5px;
}
.menu{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.menu a{
  color:white;
  text-decoration:none;
  padding:10px 18px;
  border-radius:6px;
  font-weight:500;
  display:inline-block;
}
.menu a:hover{
  background:linear-gradient(135deg,#d4af37,#f1c40f);
  color:#0b5d2a;
}

/* Dropdown */
.dropdown{
  position:relative;
}
.dropdown-content{
  display:none;
  position:absolute;
  background:#0b5d2a;
  border-radius:8px;
  min-width:200px;
  top:100%;
  left:0;
  z-index:100;
}
.dropdown:hover .dropdown-content{
  display:block;
}
.dropdown-content a{
  display:block;
  padding:10px;
  color:#f1c40f;
}

/* ===== Container ===== */
.container{
  max-width:1100px;
  margin:50px auto;
  padding:40px;
  background:white;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08),0 0 0 1px rgba(212,175,55,0.15);
  position:relative;
}
.container::before{
  content:"";
  position:absolute;
  top:0;
  left:20%;
  width:60%;
  height:4px;
  background:linear-gradient(to right,transparent,#d4af37,transparent);
}

/* ===== Page Title ===== */
h2{
  font-size:2.2em;
  color:#0b5d2a;
  margin-bottom:25px;
  text-align:center; /* aligned centrally with content */
}
h2::after{
  content:"";
  display:block;
  width:60%;
  height:3px;
  background:linear-gradient(to right,#d4af37,transparent);
  margin:8px auto 0 auto;
}

/* ===== Alumni Cards ===== */
#alumniGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}
.card{
  background:linear-gradient(to right,#ffffff,#f9fdf9);
  padding:25px;
  border-left:5px solid #d4af37;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}
.card h3{ color:#0b5d2a; margin-bottom:10px; }
.card p{ color:#555; }

/* ===== Footer ===== */
footer{
  margin-top:40px;
  background:linear-gradient(135deg,#0b5d2a,#0f7a38,#0b5d2a);
  color:white;
  text-align:center;
  padding:15px;
  border-top:4px solid #d4af37;
}

/* ===== Mobile ===== */
@media(max-width:768px){
  .header-logo{ width:65px; height:65px; margin-bottom:10px; }
  header h1{ font-size:1.4em; }
  nav{ justify-content:center; }
  .menu{ flex-direction:column; gap:6px; }
  .container{ margin:20px; padding:20px; }
}
</style>
</head>
<body>

<header>
  <img src="Logo 5.png" class="header-logo" alt="Al-Hassan Logo">
  <div class="header-title">
    <h1>Al-Hassan Institute of Health Sciences – Yumbe, Uganda</h1>
  </div>
  <nav>
    <ul class="menu">
      <li><a href="index.html">Home</a></li>
      <li class="dropdown">
        <a href="#">Alumni ▾</a>
        <ul class="dropdown-content">
          <li><a href="alumni-directory.html">Directory</a></li>
          <li><a href="alumni-testimonials.html">Testimonials</a></li>
          <li><a href="alumni-success-stories.html">Success Stories</a></li>
          <li><a href="alumni-register.html">Register</a></li>
        </ul>
      </li>
    </ul>
  </nav>
</header>

<div class="container">
<h2>Alumni Success Stories</h2>
<div id="alumniGrid"></div>
</div>

<footer>
© 2026 Al-Hassan Institute of Health Sciences – Yumbe, Uganda. All Rights Reserved
</footer>

<script>
// ===== Dynamic Alumni JSON =====
const alumniData = [
  { "title":"From Student to Hospital Director", "description":"Ahmed Hassan graduated with distinction and is now Director of Yumbe District Hospital, leading a team serving over 200,000 patients annually." },
  { "title":"International Health Career", "description":"Sarah Mohammed completed her Midwifery program and now works with international health organizations supporting maternal health initiatives across Africa." },
  { "title":"Community Health Leader", "description":"James transformed rural healthcare by establishing a modern diagnostic laboratory, improving disease detection and treatment outcomes." }
];

// ===== Populate Alumni Cards =====
const alumniGrid = document.getElementById('alumniGrid');
alumniData.forEach(item => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>${item.title}</h3>
    <p>${item.description}</p>
  `;
  alumniGrid.appendChild(card);
});
</script>

</body>
</html>
